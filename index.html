<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sleek Gallery - Party Glow Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: sans-serif; user-select: none; }
        #loader-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .loader-ring { width: 60px; height: 60px; border: 3px solid #222; border-top: 3px solid #ffaa00; border-radius: 50%; animation: spin 1s infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #ui-layer, #pro-editor, #model-list, .action-btn { z-index: 1000; position: absolute; }
        #ui-layer { top: 15px; width: 100%; text-align: center; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        #room-display { font-size: 10px; color: #fff; background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 4px; border: 1px solid #333; }
        #pro-editor { left: 8px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.85); color: white; padding: 10px; border-radius: 10px; font-size: 9px; width: 175px; border: 1px solid #444; }
        .action-btn { left: 50%; transform: translateX(-50%); padding: 12px 24px; font-size: 13px; font-weight: bold; color: #fff; border-radius: 30px; display: none; border: none; cursor: pointer; }
        #door-btn { top: 35%; background: #444; }
        #power-btn { bottom: 85px; background: #222; }
        #interact-btn { bottom: 30px; background: #007bff; }
        #zone-move, #zone-look { position: absolute; top: 0; width: 48vw; height: 100vh; z-index: 500; }
        #zone-move { left: 0; } #zone-look { right: 0; }
        #joy-container { position: absolute; width: 70px; height: 70px; display: none; pointer-events: none; z-index: 600; transform: translate(-50%, -50%); }
        #joy-base { width: 100%; height: 100%; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; background: rgba(255,255,255,0.1); }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 25px; height: 25px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }
        #html-frame-element { width: 1280px; height: 720px; background: #000; border: 15px solid #111; }
        #totify-iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="loader-screen"><div class="loader-ring"></div></div>
<div id="ui-layer"><div id="room-display">SPAWN ROOM</div></div>
<div id="pro-editor" style="display:none;">Editing Tools Active</div>

<button id="door-btn" class="action-btn">🚪 OPEN DOOR</button>
<button id="power-btn" class="action-btn">🔌 POWER ON</button>
<button id="interact-btn" class="action-btn">🎯 INTERACT</button>

<div id="zone-move"></div><div id="zone-look"></div>
<div id="joy-container"><div id="joy-base"></div><div id="joy-stick"></div></div>
<div style="display:none;"><div id="html-frame-element"><iframe id="totify-iframe"></iframe></div></div>

<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }</script>
<script type="module">
    import * as THREE from 'three';
    import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const floorY = -50, T = 350, W = 1200, H = 1200;
    let isDoorOpen = false, isPowered = false, isInteracting = false;
    let velocity = new THREE.Vector3(), move = {x:0, y:0}, mixers = [];
    
    const scene = new THREE.Scene();
    const cssScene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 1, 5000);
    camera.rotation.order = 'YXZ';

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const cssRenderer = new CSS3DRenderer();
    cssRenderer.setSize(window.innerWidth, window.innerHeight);
    cssRenderer.domElement.style.position = 'absolute';
    cssRenderer.domElement.style.top = '0';
    cssRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(cssRenderer.domElement);

    const pmrem = new THREE.PMREMGenerator(renderer);
    const envTex = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    scene.environment = envTex;

    // --- LIGHTING ---
    const ambLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambLight);
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
    sunLight.position.set(200, 500, 200);
    scene.add(sunLight);

    const loader = new GLTFLoader();
    const texLoader = new THREE.TextureLoader();

    // --- PARTY LIGHTS SYSTEM ---
    function initFairyLights() {
        const count = 1200;
        const geo = new THREE.SphereGeometry(1.5, 6, 6);
        const mat = new THREE.MeshStandardMaterial({ 
            color: 0xffaa00, emissive: 0xff6600, emissiveIntensity: 15, toneMapped: false 
        });
        const mesh = new THREE.InstancedMesh(geo, mat, count);
        const dummy = new THREE.Object3D();
        
        let i = 0;
        const addRow = (x1, x2, z1, z2, y, num) => {
            for(let k=0; k<num; k++) {
                dummy.position.set(THREE.MathUtils.lerp(x1,x2,k/num), y - (Math.random()*150), THREE.MathUtils.lerp(z1,z2,k/num));
                dummy.updateMatrix(); mesh.setMatrixAt(i++, dummy.matrix);
            }
        };
        // No lights on TV Wall (Left Wall)
        addRow(-580, 580, -580, -580, floorY+T, 40); // Back
        addRow(580, 580, -580, -50, floorY+T, 30);   // Right
        addRow(-580, 580, -50, -50, floorY+T, 30);   // Front Divider
        scene.add(mesh);

        // REAL PointLights to illuminate the models/pics
        const lightSpots = [[-400,150,-550], [400,150,-550], [550,150,-300], [0,280,-300]];
        lightSpots.forEach(p => {
            const pl = new THREE.PointLight(0xffaa00, 0, 800, 1.8);
            pl.position.set(p[0],p[1],p[2]);
            pl.userData.isParty = true;
            scene.add(pl);
        });
    }

    const glbItems = [
        { src: '2533ef500ece4fcc804872c706df036b (1).glb', p: [-7, 177, 7], r: [0, 0], s: [41, 41, 41] },
        { src: 'stage.glb', p: [-30, 97, -564], r: [0, 90], s: [173, 173, 173] },
        { src: 'textured.glb', p: [1, 27, -385], r: [0, 0], s: [14, 14, 14] },
        { src: 'hbday.glb', p: [-9, 170, -560], r: [0, 0], s: [92, 92, 92] },
        { src: 'indu.glb', p: [-18, 90, -578], r: [0, 6], s: [56, 56, 56] },
        { src: 'flowerframe .glb', p: [-589, 96, -173], r: [0, 90], s: [72, 72, 72] }
    ];

    const picItems = [
        { src: 'Picsart_26-01-08_18-59-32-352.jpg', p: [487, -46, -177], r: [90, 0], s: [368, 368] },
        { src: 'images - 2026-01-30T184744.639.jpeg', p: [598, 184, -599], r: [0, 0], s: [800, 589] },
        { src: 'surface-with-abstract-watercolor-paint_23-2148733391 (1).jpg', p: [-599, 48, -306], r: [0, 90], s: [622, 582] }
    ];

    async function start() {
        initFairyLights();
        
        // Load GLBs with Physical Material
        glbItems.forEach(item => {
            loader.load(item.src, (gltf) => {
                const m = gltf.scene;
                m.traverse(n => { if(n.isMesh) { n.material.envMapIntensity = 1; n.castShadow=true; } });
                m.position.set(item.p[0], item.p[1], item.p[2]);
                m.scale.set(item.s[0], item.s[1], item.s[2]);
                scene.add(m);
            });
        });

        // Load Wall Pics using Standard Material (so they react to lights)
        picItems.forEach(d => {
            const mat = new THREE.MeshStandardMaterial({ map: texLoader.load(d.src), side: 2, roughness: 0.8 });
            const m = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), mat);
            m.position.set(d.p[0], d.p[1], d.p[2]);
            m.rotation.set(THREE.MathUtils.degToRad(d.r[0]), THREE.MathUtils.degToRad(d.r[1]), 0);
            m.scale.set(d.s[0], d.s[1], 1);
            scene.add(m);
        });

        // Architecture
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5 });
        const box = (w,h,d,x,y,z) => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wallMat);
            m.position.set(x,y,z); scene.add(m); return m;
        };
        box(W, 2, H, 0, floorY, 0); // Floor
        box(W, 2, H, 0, floorY+T, 0); // Ceiling
        box(10, T, H, -605, floorY+T/2, 0); // Left
        box(10, T, H, 605, floorY+T/2, 0); // Right
        box(W, T, 10, 0, floorY+T/2, -605); // Back
        const door = box(100, 180, 8, 0, floorY+90, 0);

        // TV
        const tvFrame = document.getElementById('html-frame-element');
        const tvObj = new CSS3DObject(tvFrame);
        tvObj.position.set(-595, floorY+150, -300); tvObj.rotation.y = Math.PI/2; tvObj.scale.set(0.15, 0.15, 0.15);
        cssScene.add(tvObj);

        document.getElementById('loader-screen').style.display = 'none';
        animate();
    }

    // Input Logic
    let joyId = null;
    const zMove = document.getElementById('zone-move'), joyS = document.getElementById('joy-stick'), joyC = document.getElementById('joy-container');
    zMove.addEventListener('touchstart', e => { const t = e.touches[0]; joyId = t.identifier; joyC.style.display='block'; joyC.style.left=t.clientX+'px'; joyC.style.top=t.clientY+'px'; });
    zMove.addEventListener('touchmove', e => { for(let t of e.touches) if(t.identifier === joyId) { move = {x: (t.clientX - parseInt(joyC.style.left))/35, y: (t.clientY - parseInt(joyC.style.top))/35}; } });
    zMove.addEventListener('touchend', () => { move={x:0,y:0}; joyC.style.display='none'; });

    function animate() {
        requestAnimationFrame(animate);
        
        // Movement
        const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
        const r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y=0; r.normalize();
        velocity.add(f.multiplyScalar(-move.y * 1.5)).add(r.multiplyScalar(move.x * 1.5));
        velocity.multiplyScalar(0.9); camera.position.add(velocity);

        // Mode Switching
        const isDark = camera.position.z < -20;
        const targetAmb = isDark ? 0.05 : 1.2;
        ambLight.intensity += (targetAmb - ambLight.intensity) * 0.05;
        sunLight.intensity += (isDark ? 0 : 1.5 - sunLight.intensity) * 0.05;

        scene.children.forEach(c => {
            if(c.userData.isParty) {
                c.intensity += (isDark ? 4.0 : 0 - c.intensity) * 0.05;
            }
        });

        scene.environment = isDark ? null : envTex;
        document.getElementById('room-display').innerText = isDark ? "PARTY DARK (LIGHTS ON)" : "SPAWN ROOM";

        renderer.render(scene, camera);
        cssRenderer.render(cssScene, camera);
    }

    document.getElementById('door-btn').onclick = () => isDoorOpen = !isDoorOpen;
    document.getElementById('power-btn').onclick = () => { isPowered = !isPowered; document.getElementById('totify-iframe').src = isPowered ? "https://impraveen07.github.io/Win7/" : ""; };
    
    start();
</script>
</body>
</html>
