<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sleek Gallery - Permanent Party</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: sans-serif; user-select: none; }
        #loader-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .loader-ring { width: 60px; height: 60px; border: 3px solid #222; border-top: 3px solid #ffaa00; border-radius: 50%; animation: spin 1s infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loader-text { color: #fff; font-size: 10px; margin-top: 20px; letter-spacing: 2px; text-transform: uppercase; }
        #ui-layer, #pro-editor, #model-list, .action-btn { z-index: 1000; position: absolute; }
        #ui-layer { top: 15px; width: 100%; text-align: center; pointer-events: none; }
        #room-display { font-size: 10px; color: #fff; background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 4px; border: 1px solid #333; }
        #pro-editor { left: 8px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.85); color: white; padding: 10px; border-radius: 10px; font-size: 9px; width: 175px; border: 1px solid #444; }
        .ctrl-row { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
        .num-in { width: 40px; background: #111; border: 1px solid #444; color: #ffaa00; text-align: center; font-size: 9px; }
        .step-b { background: #444; color: #fff; border: none; width: 20px; height: 20px; cursor: pointer; }
        input[type="range"] { width: 100%; accent-color: #ffaa00; }
        #model-list { right: 10px; top: 15px; width: 150px; background: rgba(0,0,0,0.7); color: white; padding: 8px; border-radius: 6px; font-size: 9px; max-height: 40vh; overflow-y: auto; border: 1px solid #444; }
        .list-item { background: #333; padding: 6px; margin-top: 4px; border-radius: 3px; border-left: 3px solid #ffaa00; }
        .action-btn { left: 50%; transform: translateX(-50%); padding: 12px 24px; font-size: 13px; font-weight: bold; color: #fff; border-radius: 30px; display: none; border: none; cursor: pointer; }
        #door-btn { top: 35%; background: #444; }
        #power-btn { bottom: 85px; background: #222; }
        #interact-btn { bottom: 30px; background: #007bff; }
        #zone-move, #zone-look { position: absolute; top: 0; width: 48vw; height: 100vh; z-index: 500; }
        #zone-move { left: 0; } #zone-look { right: 0; }
        #joy-container { position: absolute; width: 70px; height: 70px; display: none; pointer-events: none; z-index: 600; transform: translate(-50%, -50%); }
        #joy-base { width: 100%; height: 100%; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; background: rgba(255,255,255,0.1); }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 25px; height: 25px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }
        #html-frame-element { width: 1280px; height: 720px; background: #000; border: 15px solid #111; }
        #totify-iframe { width: 100%; height: 100%; border: none; }
        #touch-blocker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 99; }
        .model-label { color: #fff; background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 4px; font-size: 8px; pointer-events: none; }
    </style>
</head>
<body>

<div id="loader-screen">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading Party Scene...</div>
</div>

<div id="ui-layer"><div id="room-display">SPAWN ROOM</div></div>
<div id="model-list"><strong>USER ITEMS</strong><div id="items-container"></div></div>
<div id="pro-editor">
    <strong style="color:#ffaa00">PRO TOOLS</strong>
    <input type="file" id="file-input" accept=".glb,.gltf,.jpg,.png">
    <div id="dynamic-controls"></div>
</div>

<button id="door-btn" class="action-btn">🚪 OPEN DOOR</button>
<button id="power-btn" class="action-btn">🔌 POWER ON</button>
<button id="interact-btn" class="action-btn">🎯 INTERACT</button>

<div id="zone-move"></div><div id="zone-look"></div>
<div id="joy-container"><div id="joy-base"></div><div id="joy-stick"></div></div>
<div style="display:none;"><div id="html-frame-element"><div id="touch-blocker"></div><iframe id="totify-iframe"></iframe></div></div>

<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }</script>
<script type="module">
    import * as THREE from 'three';
    import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const floorY = -50, T = 350, W = 1200, H = 1200;
    let isDoorOpen = false, isPowered = false, isInteracting = false;
    let velocity = new THREE.Vector3(), move = {x:0, y:0}, savedModels = [], mixers = [];
    window.editingIndex = -1;
    const clock = new THREE.Clock();
    const scene = new THREE.Scene(); 
    const cssScene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 1, 5000);
    camera.rotation.order = 'YXZ';

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const cssRenderer = new CSS3DRenderer();
    cssRenderer.setSize(window.innerWidth, window.innerHeight);
    cssRenderer.domElement.style.position = 'absolute';
    cssRenderer.domElement.style.top = '0';
    cssRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(cssRenderer.domElement);

    // --- LIGHTING SETUP ---
    // Ambient is very low so the "Dark Room" actually looks dark
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.2); 
    scene.add(ambientLight);

    // Sun light ONLY for the Spawn Room
    const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
    sunLight.position.set(0, 300, 400);
    scene.add(sunLight);

    const pmrem = new THREE.PMREMGenerator(renderer);
    const envTex = pmrem.fromScene(new RoomEnvironment()).texture;
    scene.environment = envTex;

    const loader = new GLTFLoader();
    const texLoader = new THREE.TextureLoader();

    // --- FAIRY LIGHT SYSTEM (Optimized & Dark Mode Ready) ---
    function initFairyLights() {
        const bulbGeo = new THREE.SphereGeometry(1.2, 4, 4);
        const bulbMat = new THREE.MeshStandardMaterial({ 
            color: 0xffaa00, 
            emissive: 0xffaa00, 
            emissiveIntensity: 15,
            toneMapped: false 
        });
        const instanced = new THREE.InstancedMesh(bulbGeo, bulbMat, 1500);
        const dummy = new THREE.Object3D();
        let idx = 0;

        const addLine = (p1, p2, bulbs) => {
            for(let i=0; i<bulbs; i++) {
                if(idx >= 1500) break;
                dummy.position.lerpVectors(p1, p2, i/bulbs);
                dummy.position.y += Math.random() * 5;
                dummy.updateMatrix();
                instanced.setMatrixAt(idx++, dummy.matrix);
            }
        };

        const yTop = floorY + T - 10;
        // String across Back Wall
        addLine(new THREE.Vector3(-580, yTop, -580), new THREE.Vector3(580, yTop, -580), 100);
        // String across Right Wall
        addLine(new THREE.Vector3(580, yTop, -580), new THREE.Vector3(580, yTop, -50), 60);
        // String across Divider Wall
        addLine(new THREE.Vector3(-580, yTop, -50), new THREE.Vector3(580, yTop, -50), 100);
        
        // Ceiling Zig-Zags
        for(let z=-550; z<-100; z+=100) {
            addLine(new THREE.Vector3(-580, yTop, z), new THREE.Vector3(580, yTop, z+50), 50);
        }

        scene.add(instanced);

        // Actual Point Lights to illuminate nearby PICS/MODELS
        const lightSpots = [[-400, 200, -500], [400, 200, -500], [500, 200, -250], [0, 300, -300]];
        lightSpots.forEach(pos => {
            const pl = new THREE.PointLight(0xffaa00, 2.5, 600, 1.8);
            pl.position.set(pos[0], pos[1], pos[2]);
            scene.add(pl);
        });
    }

    const glbItems = [
        { src: '2533ef500ece4fcc804872c706df036b (1).glb', p: [-7, 177, 7], r: [0, 0], s: [41, 41, 41] },
        { src: 'stage.glb', p: [-30, 97, -564], r: [0, 90], s: [173, 173, 173] },
        { src: 'textured.glb', p: [1, 27, -385], r: [0, 0], s: [14, 14, 14] },
        { src: 'hbday.glb', p: [-9, 170, -560], r: [0, 0], s: [92, 92, 92] },
        { src: 'indu.glb', p: [-18, 90, -578], r: [0, 6], s: [56, 56, 56] },
        { src: 'lipstick.glb', p: [-489, -55, -507], r: [0, 360], s: [90, 90, 90] }
    ];

    const wallPics = [
        { src: 'surface-with-abstract-watercolor-paint_23-2148733391 (1).jpg', p: [-599, 48, -306], r: [0, 90], s: [622, 582] },
        { src: 'images - 2026-01-30T184744.639.jpeg', p: [598, 184, -599], r: [0, 0], s: [800, 589] },
        { src: 'Picsart_26-01-08_18-59-32-352.jpg', p: [-598, -43, -398], r: [0, 90], s: [800, 16] }
    ];

    async function boot() {
        initFairyLights();
        
        glbItems.forEach(item => {
            loader.load(item.src, (gltf) => {
                const m = gltf.scene;
                m.position.set(item.p[0], item.p[1], item.p[2]);
                m.scale.set(item.s[0], item.s[1], item.s[2]);
                m.rotation.y = THREE.MathUtils.degToRad(item.r[1]);
                scene.add(m);
            });
        });

        wallPics.forEach(d => {
            const mat = new THREE.MeshStandardMaterial({ map: texLoader.load(d.src), side: 2, roughness: 0.8, metalness: 0 });
            const m = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), mat);
            m.position.set(d.p[0], d.p[1], d.p[2]);
            m.rotation.set(THREE.MathUtils.degToRad(d.r[0]), THREE.MathUtils.degToRad(d.r[1]), 0);
            m.scale.set(d.s[0], d.s[1], 1);
            scene.add(m);
        });

        // Basic Room Geometry
        const box = (w, h, d, x, y, z, color) => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color}));
            m.position.set(x,y,z); scene.add(m); return m;
        };
        box(W, 2, H, 0, floorY, 0, "#111"); // Floor
        box(W, 2, H, 0, floorY+T, 0, "#222"); // Ceiling
        box(W, T, 10, 0, floorY+T/2, -605, "#222"); // Back
        box(10, T, H, 605, floorY+T/2, 0, "#222"); // Right
        box(10, T, H, -605, floorY+T/2, 0, "#222"); // Left (TV WALL)
        box(550, T, 15, -325, floorY+T/2, 0, "#222"); // Divider L
        box(550, T, 15, 325, floorY+T/2, 0, "#222"); // Divider R
        const doorMesh = box(100, 180, 8, 0, floorY + 90, 0, "#050505");

        // CSS TV
        const frameEl = document.getElementById('html-frame-element');
        const cssObj = new CSS3DObject(frameEl); 
        cssObj.position.set(-585, floorY + 150, -300); 
        cssObj.rotation.y = Math.PI/2; 
        cssObj.scale.set(0.15, 0.15, 0.15); 
        cssScene.add(cssObj);

        document.getElementById('loader-screen').style.display = 'none';
        animate();
    }

    // Interaction Logic (Strictly same as OG)
    const zMove = document.getElementById('zone-move'), zLook = document.getElementById('zone-look');
    let joyId = null, joySt = {x:0,y:0};
    zMove.addEventListener('touchstart', e => { joyId = e.changedTouches[0].identifier; joySt = {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY}; document.getElementById('joy-container').style.display='block'; });
    zMove.addEventListener('touchmove', e => { for(let t of e.changedTouches) if(t.identifier === joyId) { let dx=t.clientX-joySt.x, dy=t.clientY-joySt.y; move={x:dx/35, y:dy/35}; } });
    zMove.addEventListener('touchend', () => { move={x:0,y:0}; document.getElementById('joy-container').style.display='none'; });

    document.getElementById('door-btn').onclick = () => isDoorOpen = !isDoorOpen;
    document.getElementById('power-btn').onclick = () => {
        isPowered = !isPowered;
        document.getElementById('totify-iframe').src = isPowered ? "https://impraveen07.github.io/Win7/" : "";
        frameEl.style.display = isPowered ? 'block' : 'none';
    };

    camera.position.set(0, 50, 400);

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        
        // Move
        const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
        const r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y=0; r.normalize();
        velocity.add(f.multiplyScalar(-move.y * 1.5)).add(r.multiplyScalar(move.x * 1.5));
        velocity.multiplyScalar(0.9); camera.position.add(velocity);

        // --- THE "STRICT DARK" LOGIC ---
        const inTvRoom = camera.position.z < -20;
        
        // Spawn room has sunlight. TV room does NOT.
        sunLight.intensity = inTvRoom ? 0 : 2.0; 
        // Background environment (reflections) only in spawn room
        scene.environment = inTvRoom ? null : envTex;

        // UI Updates
        document.getElementById('room-display').innerText = inTvRoom ? "PARTY MODE" : "SPAWN ROOM";
        document.getElementById('door-btn').style.display = Math.abs(camera.position.z) < 150 ? 'block' : 'none';
        document.getElementById('power-btn').style.display = (inTvRoom && camera.position.distanceTo(new THREE.Vector3(-585, 100, -300)) < 400) ? 'block' : 'none';

        cssRenderer.render(cssScene, camera);
        renderer.render(scene, camera);
    }

    boot();
</script>
</body>
</html>
