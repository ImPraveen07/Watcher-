        .cat-loader { position: relative; width: 80px; height: 50px; background: #fff; border-radius: 40px 40px 60px 60px; animation: bounce 0.6s infinite alternate; box-shadow: 0 5px 15px rgba(255,105,180,0.3); }
        .cat-loader::before, .cat-loader::after { content: ''; position: absolute; top: -10px; width: 20px; height: 20px; background: #fff; border-radius: 5px; }

        #loader-stats { color: #ff85c1; font-size: 11px; margin-top: 8px; font-family: monospace; }
        .progress-container { width: 180px; height: 6px; background: #fff; margin-top: 15px; border-radius: 10px; overflow: hidden; border: 2px solid #ffb3d9; }
        #progress-bar { width: 0%; height: 100%; background: #ff69b4; transition: width 0.3s; }
        #ui-layer, .action-btn { z-index: 1000; position: absolute; }
        #ui-layer { top: 15px; width: 100%; text-align: center; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        #room-display { font-size: 10px; color: #fff; background: rgba(255,105,180,0.7); padding: 4px 12px; border-radius: 15px; letter-spacing: 1px; }
        .action-btn { left: 50%; transform: translateX(-50%); padding: 12px 24px; font-size: 13px; font-weight: bold; color: #fff; border-radius: 30px; display: none; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

    async function boot() {
        await initDB();
        const statsText = document.getElementById('loader-stats');
        const progressBar = document.getElementById('progress-bar');
        const msgText = document.getElementById('loader-msg');
        let loadedCount = 0, totalMB = 0;

        const loadGLB = (item) => new Promise(async (resolve) => {
            try {
                let blob = await getCached(item.src);
                if (!blob) {
                    msgText.innerText = `Fetching: ${item.src}`;
                    const res = await fetch(item.src);
                    if(!res.ok) throw new Error("File not found");
                    blob = await res.blob();
                    await saveCached(item.src, blob);
                }
                totalMB += (blob.size / (1024 * 1024));
                statsText.innerText = `${totalMB.toFixed(1)} MB Loaded`;
                
                const url = URL.createObjectURL(blob);
                loader.load(url, (gltf) => {
                    const model = gltf.scene;
                    model.traverse(node => {
                        if (node.isMesh && node.material) {
                            if (item.src === 'indu.glb' || item.src === 'hbday.glb') {
                                node.material.metalness = 1.0; node.material.roughness = 0.05; node.material.envMapIntensity = 15.0;
                            } else { node.material.metalness = 0.0; node.material.roughness = 0.8; }
                        }
                    });
                    model.position.set(item.p[0], item.p[1], item.p[2]);
                    model.rotation.set(THREE.MathUtils.degToRad(item.r[0]), THREE.MathUtils.degToRad(item.r[1]), 0);
                    model.scale.set(item.s[0], item.s[1], item.s[2]);
                    if (gltf.animations.length > 0) {
                        const mixer = new THREE.AnimationMixer(model);
                        gltf.animations.forEach(clip => mixer.clipAction(clip).play());
                        mixers.push(mixer);
                    }
                    scene.add(model);
                    URL.revokeObjectURL(url);
                    resolve();
                }, undefined, resolve);
            } catch (e) { console.error(e); resolve(); }
        });

        for (const item of glbItems) {
            await loadGLB(item);
            loadedCount++;
            progressBar.style.width = `${(loadedCount / glbItems.length) * 100}%`;
        }

        staticItems.forEach(d => {
            const m = new THREE.Mesh(sharedPlaneGeom, new THREE.MeshBasicMaterial({ map: getTex(d.src), side: 2, transparent: true }));
            m.position.set(d.p[0], d.p[1], d.p[2]); 
            m.rotation.set(THREE.MathUtils.degToRad(d.r[0]), THREE.MathUtils.degToRad(d.r[1]), 0); 
            m.scale.set(d.s[0], d.s[1], 1);
            scene.add(m);
        });

        msgText.innerText = "Ready! ✨";
        setTimeout(() => { 
            document.getElementById('loader-screen').style.opacity = '0'; 
            setTimeout(() => { 
                document.getElementById('loader-screen').style.display = 'none'; 
                animate(); 
            }, 500); 
        }, 1200);
    }

    const box = (w, h, d, x, y, z, color) => { const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color, roughness: 0.1})); m.position.set(x,y,z); scene.add(m); return m; };
    box(W, 2, H, 0, floorY, 0, "#222"); box(W, 2, H, 0, floorY + T, 0, "#ffffff"); 
    box(W, T, 10, 0, floorY+T/2, 605, "#333"); box(W, T, 10, 0, floorY+T/2, -605, "#333"); 
    box(10, T, H, -605, floorY+T/2, 0, "#333"); box(10, T, H, 605, floorY+T/2, 0, "#333"); 
    box(550, T, 15, -325, floorY+T/2, 0, "#333"); box(550, T, 15, 325, floorY+T/2, 0, "#333"); 
    box(100, T-180, 15, 0, floorY+260, 0, "#333"); const doorMesh = box(100, 180, 8, 0, floorY + 90, 0, "#111");

    const frameEl = document.getElementById('html-frame-element');
    const cssObj = new CSS3DObject(frameEl); 
    cssObj.position.set(-585, floorY + 150, -300); 
    cssObj.rotation.y = Math.PI/2; 
    cssObj.scale.set(0.15, 0.15, 0.15); 
    cssScene.add(cssObj);

    const occMesh = new THREE.Mesh(new THREE.PlaneGeometry(1280, 720), new THREE.MeshBasicMaterial({ color: 0x000, transparent: true, opacity: 0, blending: THREE.NoBlending })); 
    occMesh.position.copy(cssObj.position); occMesh.rotation.copy(cssObj.rotation); occMesh.scale.copy(cssObj.scale); 
    scene.add(occMesh);

    let joyId = null, lookId = null, lastL = {x:0, y:0};
    const zMove = document.getElementById('zone-move'), joyS = document.getElementById('joy-stick'), joyC = document.getElementById('joy-container');
    let joySt = {x:0, y:0};

    zMove.addEventListener('touchstart', e => { 
        if(isInteracting) return; 
        const t = e.changedTouches[0]; joyId = t.identifier; joySt = {x:t.clientX, y:t.clientY}; 
    });

    zMove.addEventListener('touchmove', e => { 
        if(isInteracting) return; 
        for(let t of e.changedTouches) if(t.identifier === joyId) { 
            let dx = t.clientX-joySt.x, dy = t.clientY-joySt.y; 
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 35), a = Math.atan2(dy, dx); 
            joyS.style.transform = `translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d}px))`; 
            move = {x: Math.cos(a)*d/35, y: Math.sin(a)*d/35}; 
        } 
    });

    zMove.addEventListener('touchend', () => { joyId=null; move={x:0,y:0}; joyS.style.transform = 'translate(-50%, -50%)'; });
    
    window.addEventListener('touchstart', e => { 
        if(e.target.closest('.action-btn')) return; 
        const t = e.changedTouches[0];
        if (t.identifier === joyId) return;
        if (isInteracting && e.target.id === "totify-iframe") return;
        lookId = t.identifier; 
        lastL = {x:t.clientX, y:t.clientY}; 
    }, { passive: false });

    window.addEventListener('touchmove', e => { 
        for(let t of e.changedTouches) {
            if(t.identifier === lookId) {
                camera.rotation.y -= (t.clientX - lastL.x) * 0.0035;
                camera.rotation.x -= (t.clientY - lastL.y) * 0.0035;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
                lastL = {x: t.clientX, y: t.clientY};
            }
        }
    }, { passive: false });

    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) if(t.identifier === lookId) lookId = null;
    });

    const iBtn = document.getElementById('interact-btn'), pBtn = document.getElementById('power-btn');
    document.getElementById('door-btn').onclick = () => isDoorOpen = !isDoorOpen;
    pBtn.onclick = () => { 
        isPowered = !isPowered; 
        document.getElementById('totify-iframe').src = isPowered ? "https://impraveen07.github.io/Win7/" : ""; 
        frameEl.style.display = isPowered ? 'block' : 'none'; 
        pBtn.innerText = isPowered ? "🔌 POWER OFF" : "🔌 POWER ON"; 
        pBtn.style.background = isPowered ? "#dc3545" : "#222"; 
    };
    
    iBtn.onclick = () => { 
        isInteracting = !isInteracting; 
        if(isInteracting) { 
            cssRenderer.domElement.style.zIndex='999'; cssRenderer.domElement.style.pointerEvents='auto'; 
            renderer.domElement.style.zIndex='1'; 
            joyC.style.display = 'none'; document.getElementById('touch-blocker').style.display='none'; 
            iBtn.innerText="🔒 EXIT INTERACT"; iBtn.style.background="#dc3545"; 
        } else { 
            renderer.domElement.style.zIndex='2'; cssRenderer.domElement.style.zIndex='1'; cssRenderer.domElement.style.pointerEvents='none'; 
            joyC.style.display = 'block'; document.getElementById('touch-blocker').style.display='block'; 
            iBtn.innerText="🎯 INTERACT"; iBtn.style.background="#007bff"; move={x:0,y:0}; 
        } 
    };

    camera.position.set(0, 50, 400);
    const fVec = new THREE.Vector3(), rVec = new THREE.Vector3();
    let surpriseTriggered = false, fadeLight = false;
    const poppers = [], balloons = [], popColors = [0xff69b4, 0xffb3d9, 0xff1493, 0xffff00, 0xff00ff, 0x00ffff, 0xffffff, 0xffa500];

    function triggerParty() {
        fadeLight = true;
        const stripGeo = new THREE.PlaneGeometry(8, 3), squareGeo = new THREE.PlaneGeometry(5, 5), dotGeo = new THREE.CircleGeometry(3, 8);
        for(let i=0; i<800; i++) {
            const m = new THREE.Mesh([stripGeo, squareGeo, dotGeo][Math.floor(Math.random()*3)], new THREE.MeshBasicMaterial({color: popColors[Math.floor(Math.random()*popColors.length)], side:2}));
            m.position.set((Math.random()-0.5)*900, 330, -100 - Math.random()*500); 
            scene.add(m);
            poppers.push({ mesh: m, vel: new THREE.Vector3((Math.random()-0.5)*3.5, -(Math.random()*1.8 + 1.2), (Math.random()-0.5)*3.5), rot: new THREE.Vector3(Math.random()*0.2, Math.random()*0.2, 0) });
        }
        for(let i=0; i<40; i++) {
            const bGrp = new THREE.Group();
            const bGeo = new THREE.SphereGeometry(14, 20, 20); bGeo.scale(1, 1.3, 1);
            const bMesh = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color: popColors[Math.floor(Math.random()*popColors.length)], metalness: 0.1, roughness: 0.1, transparent: true, opacity: 0.9 }));
            const knot = new THREE.Mesh(new THREE.ConeGeometry(3, 4, 8), bMesh.material); knot.position.y = -18; knot.rotation.x = Math.PI; bMesh.add(knot);
            bGrp.add(bMesh); bGrp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, -18, 0), new THREE.Vector3(0, -120, 0)]), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })));
            bGrp.position.set((Math.random()-0.5)*700, floorY - 50, -100 - Math.random()*500);
            scene.add(bGrp);
            balloons.push({ obj: bGrp, speed: 1.5 + Math.random() * 2, off: Math.random() * 100, atCeiling: false });
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta(), time = Date.now() * 0.001;
        mixers.forEach(m => m.update(delta));
        if(!surpriseTriggered && camera.position.z < 0 && isDoorOpen) { surpriseTriggered = true; triggerParty(); }
        if(fadeLight) { ambLight.intensity += (1.4 - ambLight.intensity) * 0.05; dirLight.intensity += (2.5 - dirLight.intensity) * 0.05; }
        poppers.forEach(p => { if(p.mesh.position.y > floorY + 2) { p.mesh.position.add(p.vel); p.mesh.rotation.x += p.rot.x; p.mesh.rotation.y += p.rot.y; } });
        balloons.forEach(b => { 
            if(!b.atCeiling) { b.obj.position.y += b.speed; b.obj.position.x += Math.sin(time + b.off) * 0.3; if(b.obj.position.y >= ceilingY - 18) b.atCeiling = true; } 
            else { b.obj.position.y = (ceilingY - 18) + Math.sin(time * 0.8 + b.off) * 2; b.obj.rotation.z = Math.sin(time + b.off) * 0.1; }
        });
        if(!isInteracting && (move.x !== 0 || move.y !== 0)) { fVec.set(0,0,-1).applyQuaternion(camera.quaternion); fVec.y=0; fVec.normalize(); rVec.set(1,0,0).applyQuaternion(camera.quaternion); rVec.y=0; rVec.normalize(); velocity.add(fVec.multiplyScalar(-move.y *.8)).add(rVec.multiplyScalar(move.x * 1.5)); }
        velocity.multiplyScalar(0.9); camera.position.add(velocity);
        camera.position.x = Math.max(-550, Math.min(550, camera.position.x)); camera.position.z = Math.max(-550, Math.min(550, camera.position.z));
        if(Math.abs(camera.position.z) < 25 && (!isDoorOpen || Math.abs(camera.position.x) > 45)) camera.position.z = camera.position.z > 0 ? 25 : -25;
        document.getElementById('door-btn').style.display = Math.abs(camera.position.z) < 180 ? 'block' : 'none';
        pBtn.style.display = (camera.position.z < 0 && camera.position.distanceTo(cssObj.position) < 450) ? 'block' : 'none';
        iBtn.style.display = (isPowered && camera.position.z < 0 && camera.position.distanceTo(cssObj.position) < 350) ? 'block' : 'none';
        doorMesh.position.x += ((isDoorOpen ? -110 : 0) - doorMesh.position.x) * 0.1;
        cssRenderer.render(cssScene, camera); renderer.render(scene, camera); 
        document.getElementById('room-display').innerText = camera.position.z > 0 ? "SPAWN ROOM" : "TV ROOM";
    }
