    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: sans-serif; user-select: none; }

        .cat-loader { position: relative; width: 80px; height: 50px; background: #fff; border-radius: 40px 40px 60px 60px; animation: bounce 0.6s infinite alternate; box-shadow: 0 5px 15px rgba(255,105,180,0.3); }
        .cat-loader::before, .cat-loader::after { content: ''; position: absolute; top: -10px; width: 20px; height: 20px; background: #fff; border-radius: 5px; }
        .cat-loader::before { left: 10px; transform: rotate(-15deg); }
        .cat-loader::after { right: 10px; transform: rotate(15deg); }
        .cat-eyes { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; padding: 0 15px; box-sizing: border-box; }
        .cat-eyes::before, .cat-eyes::after { content: '•'; color: #ff69b4; font-size: 20px; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }
        .loader-text { color: #ff69b4; font-size: 12px; margin-top: 35px; letter-spacing: 1px; font-weight: bold; text-shadow: 1px 1px #fff; }
        #loader-stats { color: #ff85c1; font-size: 11px; margin-top: 8px; font-family: monospace; }
        .progress-container { width: 180px; height: 6px; background: #fff; margin-top: 15px; border-radius: 10px; overflow: hidden; border: 2px solid #ffb3d9; }
        #progress-bar { width: 0%; height: 100%; background: #ff69b4; transition: width 0.3s; }
        
        /* Watch UI Overlay */
        #watch-ui { position: fixed; top: 15px; right: 15px; z-index: 5000; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        #user-select { background: rgba(255, 105, 180, 0.9); color: white; border: 2px solid white; border-radius: 10px; padding: 8px; font-weight: bold; outline: none; }
        #status-bar { color: #fff; font-size: 10px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 5px; font-family: monospace; }
        
        #delete-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px; letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); transition: background 0.2s;}
        #delete-btn:active { background: #a71d2a; }

        #ui-layer { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 1000; }
        #room-display { font-size: 10px; color: #fff; background: rgba(255,105,180,0.7); padding: 4px 12px; border-radius: 15px; letter-spacing: 1px; }
        #html-frame-element { width: 1280px; height: 720px; background: #000; border: 10px solid #111; box-sizing: border-box; border-radius: 10px; }
        #totify-iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>

    // --- REPLAY FETCHING & DELETION ---
    const userSelect = document.getElementById('user-select');
    const statusText = document.getElementById('status-bar');
    
    // DELETE DATA FUNCTION
    document.getElementById('delete-btn').onclick = () => {
        if(confirm("Are you sure you want to delete ALL saved replays? This cannot be undone.")) {
            set(ref(db_fb, 'replays'), null).then(() => {
                alert("All recording data nuked!");
                userSelect.innerHTML = '<option value="">SELECT USER TO WATCH</option>';
                activeReplayFrames = [];
                isWatching = false;
                statusText.innerText = "LIVE: NO TARGET";
            }).catch(err => {
                alert("Failed to delete data: " + err);
            });
        }
    };

    onValue(ref(db_fb, 'replays'), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;
        userSelect.innerHTML = '<option value="">SELECT USER TO WATCH</option>';
        Object.keys(data).forEach(uid => {
            const opt = document.createElement('option');
            opt.value = uid; opt.innerText = "PLAYER: " + uid;
            userSelect.appendChild(opt);
        });
    });

    userSelect.onchange = async (e) => {
        const uid = e.target.value;
        if(!uid) { isWatching = false; return; }
        
        onValue(ref(db_fb, `replays/${uid}`), (snap) => {
            const sessions = snap.val();
            if(!sessions) return;
            
            const lastSessionId = Object.keys(sessions).pop();
            const sessionData = sessions[lastSessionId];
            
            activeReplayFrames = Object.values(sessionData).sort((a,b) => a.t - b.t);
            
            currentFrameIdx = 0;
            playbackStartTime = Date.now(); 
            surpriseTriggered = false;      
            
            isWatching = true;
            statusText.innerText = "PLAYING: " + uid;
        }, { onlyOnce: true });
    };

    // --- BOOT ENGINE ---
    const texLoader = new THREE.TextureLoader();
    const loader = new GLTFLoader();
    
    async function boot() {
        await initDB();
        const stats = document.getElementById('loader-stats');
        const progress = document.getElementById('progress-bar');
        const msgText = document.getElementById('loader-msg');
        
        let loaded = 0, totalMB = 0;
        const totalItems = glbItems.length + staticItems.length;

        // LOAD GLBs SAFELY (Will not crash on 404)
        for(let item of glbItems) {
            try {
                let blob = await getCached(item.src);
                if(!blob) { 
                    msgText.innerText = `Fetching: ${item.src}`;
                    const res = await fetch(item.src); 
                    if (res.ok) {
                        blob = await res.blob(); 
                        await saveCached(item.src, blob); 
                    }
                }
                
                if (blob) {
                    totalMB += blob.size / (1024*1024);
                    loader.load(URL.createObjectURL(blob), (gltf) => {
                        const m = gltf.scene;
                        m.position.set(item.p[0], item.p[1], item.p[2]);
                        m.rotation.set(THREE.MathUtils.degToRad(item.r[0]), THREE.MathUtils.degToRad(item.r[1]), 0);
                        m.scale.set(item.s[0], item.s[1], item.s[2]);
                        if (gltf.animations.length > 0) {
                            const mixer = new THREE.AnimationMixer(m);
                            gltf.animations.forEach(c => mixer.clipAction(c).play());
                            mixers.push(mixer);
                        }
                        scene.add(m);
                    });
                }
            } catch (e) {
                console.warn(`Skipped broken model: ${item.src}`);
            }
            loaded++; 
            stats.innerText = `${totalMB.toFixed(1)} MB Loaded`;
            progress.style.width = `${(loaded/totalItems)*100}%`;
        }

        // LOAD IMAGES SAFELY (Will not crash on 404)
        staticItems.forEach(d => {
            try {
                const m = new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshBasicMaterial({map: texLoader.load(d.src), side:2, transparent:true}));
                m.position.set(d.p[0], d.p[1], d.p[2]);
                m.rotation.set(THREE.MathUtils.degToRad(d.r[0]), THREE.MathUtils.degToRad(d.r[1]), 0);
                m.scale.set(d.s[0], d.s[1], 1);
                scene.add(m);
            } catch (e) {
                console.warn(`Skipped broken image: ${d.src}`);
            }
            loaded++;
            progress.style.width = `${(loaded/totalItems)*100}%`;
        });

        setupWorld();
        
        // NO MATTER WHAT HAPPENS, REMOVE THE LOADING SCREEN
        setTimeout(() => { 
            document.getElementById('loader-screen').style.opacity = '0'; 
            setTimeout(() => { 
                document.getElementById('loader-screen').style.display='none'; 
                animate(); 
            }, 500);
        }, 1000);
    }

    let doorMesh, cssObj;
    function setupWorld() {
        const box = (w, h, d, x, y, z, color) => { const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color})); m.position.set(x,y,z); scene.add(m); return m; };
        box(W, 2, H, 0, floorY, 0, "#222"); box(W, 2, H, 0, floorY+T, 0, "#fff");
        box(W, T, 10, 0, floorY+T/2, 605, "#333"); box(W, T, 10, 0, floorY+T/2, -605, "#333");
        box(10, T, H, -605, floorY+T/2, 0, "#333"); box(10, T, H, 605, floorY+T/2, 0, "#333");
        box(550, T, 15, -325, floorY+T/2, 0, "#333"); box(550, T, 15, 325, floorY+T/2, 0, "#333");
        box(100, T-180, 15, 0, floorY+260, 0, "#333"); doorMesh = box(100, 180, 8, 0, floorY+90, 0, "#111");

        const frameEl = document.getElementById('html-frame-element');
        cssObj = new CSS3DObject(frameEl);
        cssObj.position.set(-585, floorY + 150, -300); cssObj.rotation.y = Math.PI/2; cssObj.scale.set(0.15, 0.15, 0.15);
        cssScene.add(cssObj);
    }

    const popColors = [0xff69b4, 0xffb3d9, 0xff1493, 0xffff00, 0xff00ff, 0x00ffff];
    const poppers = [], balloons = [];
    function triggerParty() {
        bgm.play().catch(() => {});
        for(let i=0; i<300; i++) {
            const m = new THREE.Mesh(new THREE.PlaneGeometry(5,5), new THREE.MeshBasicMaterial({color: popColors[Math.floor(Math.random()*6)], side:2}));
            m.position.set((Math.random()-0.5)*900, 330, -100-Math.random()*500);
            scene.add(m);
            poppers.push({mesh:m, vel: new THREE.Vector3((Math.random()-0.5)*3, -Math.random()*2-1, (Math.random()-0.5)*3)});
        }
    }

    let playbackStartTime = 0;
    const lerp = (start, end, t) => start + (end - start) * t;

    function getInterpolatedFrame() {
        if (!isWatching || activeReplayFrames.length < 2) return null;

        if (playbackStartTime === 0) playbackStartTime = Date.now();
        const elapsed = Date.now() - playbackStartTime;
        const startT = activeReplayFrames[0].t;
        const currentPlayTime = elapsed + startT;

        let i = 0;
        while (i < activeReplayFrames.length - 2 && activeReplayFrames[i + 1].t < currentPlayTime) {
            i++;
        }

        const frameA = activeReplayFrames[i];
        const frameB = activeReplayFrames[i + 1];

        const totalGap = frameB.t - frameA.t;
        const timeIntoGap = currentPlayTime - frameA.t;
        const alpha = Math.max(0, Math.min(1, timeIntoGap / totalGap));

        if (i >= activeReplayFrames.length - 2 && alpha >= 1) {
            playbackStartTime = Date.now();
            return activeReplayFrames[0];
        }

        return {
            x: lerp(frameA.x, frameB.x, alpha),
            y: lerp(frameA.y || 50, frameB.y || 50, alpha),
            z: lerp(frameA.z, frameB.z, alpha),
            ry: lerp(frameA.ry, frameB.ry, alpha),
            rx: lerp(frameA.rx || 0, frameB.rx || 0, alpha),
            door: frameA.door, 
            tv: frameA.tv,
            party: frameA.party 
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        mixers.forEach(m => m.update(delta));

        const f = getInterpolatedFrame();

        if (f) {
            camera.position.set(f.x, f.y, f.z);
            camera.rotation.set(f.rx, f.ry, 0);
            
            isDoorOpen = f.door;
            if(isPowered !== f.tv) {
                isPowered = f.tv;
                document.getElementById('totify-iframe').src = isPowered ? "https://impraveen07.github.io/Win7/" : "";
                document.getElementById('html-frame-element').style.display = isPowered ? 'block' : 'none';
            }
            if(f.party && !surpriseTriggered) { surpriseTriggered = true; triggerParty(); }
        }

        doorMesh.position.x += ((isDoorOpen ? -110 : 0) - doorMesh.position.x) * 0.1;

        cssRenderer.render(cssScene, camera);
        renderer.render(scene, camera);
    }

    boot();
</script>
