/**
 * ASSET DATABASE SYSTEM
 */
const initDB = () => new Promise((resolve) => {
    const request = indexedDB.open(DB_NAME, 1);
    request.onupgradeneeded = (e) => {
        let db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
    };
    request.onsuccess = (e) => { database = e.target.result; resolve(); };
    request.onerror = () => resolve();
});

const cacheFetch = async (key, url) => {
    if (!database) return url;
    const tx = database.transaction(STORE_NAME, "readonly");
    const existing = await new Promise(r => {
        const req = tx.objectStore(STORE_NAME).get(key);
        req.onsuccess = () => r(req.result);
        req.onerror = () => r(null);
    });
    
    if (existing) {
        totalMemoryUsed += existing.size / (1024 * 1024);
        return URL.createObjectURL(existing);
    }
    
    const resp = await fetch(url);
    const blob = await resp.blob();
    const writeTx = database.transaction(STORE_NAME, "readwrite");
    writeTx.objectStore(STORE_NAME).put(blob, key);
    totalMemoryUsed += blob.size / (1024 * 1024);
    return URL.createObjectURL(blob);
};

    return mesh;

/**
 * LOADER & INITIALIZATION
 */
async function startApp() {
    await initDB();
    const loader = new GLTFLoader();
    const texLoader = new THREE.TextureLoader();
    const progress = document.getElementById('progress-bar');
    const statsText = document.getElementById('loader-stats');

    // Load Models
    for (let i = 0; i < glbData.length; i++) {
        const item = glbData[i];
        const url = await cacheFetch(item.src, item.src);
        
        loader.load(url, (gltf) => {
            const model = gltf.scene;
            model.position.set(item.p[0], item.p[1], item.p[2]);
            model.rotation.y = THREE.MathUtils.degToRad(item.r[1]);
            model.scale.set(item.s[0], item.s[1], item.s[2]);
            
            model.traverse(n => {
                if(n.isMesh) {
                    n.castShadow = true;
                    if(item.src === 'indu.glb') {
                        n.material.metalness = 1;
                        n.material.roughness = 0.1;
                    }
                }
            });

            if (gltf.animations.length > 0) {
                const mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => mixer.clipAction(clip).play());
                mixers.push(mixer);
            }
            scene.add(model);
        });
        
        progress.style.width = `${((i + 1) / (glbData.length + photoData.length)) * 100}%`;
        statsText.innerText = `MEMORY: ${totalMemoryUsed.toFixed(1)} MB`;
    }

    // Load Photos
    for (let j = 0; j < photoData.length; j++) {
        const p = photoData[j];
        const tex = texLoader.load(p.src);
        const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true });
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(p.s[0], p.s[1]), mat);
        mesh.position.set(p.p[0], p.p[1], p.p[2]);
        mesh.rotation.set(THREE.MathUtils.degToRad(p.r[0]), THREE.MathUtils.degToRad(p.r[1]), 0);
        scene.add(mesh);

        if(p.hang) {
            const line = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.2, ceilingY - p.p[1]),
                new THREE.MeshBasicMaterial({ color: 0x444444 })
            );
            line.position.set(p.p[0], (ceilingY + p.p[1]) / 2, p.p[2]);
            scene.add(line);
        }
        progress.style.width = `${((glbData.length + j + 1) / (glbData.length + photoData.length)) * 100}%`;
    }

    setTimeout(() => {
        document.getElementById('loader-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader-screen').style.display = 'none';
            animate();
        }, 800);
    }, 1500);
}

/**
 * CONTROLS & PHYSICS
 */
let joyId = null, lookId = null, lastTouch = {x:0, y:0}, joyAnchor = {x:0, y:0};
const joyStick = document.getElementById('joy-stick'), moveZone = document.getElementById('zone-move');

moveZone.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    joyId = t.identifier;
    joyAnchor = {x: t.clientX, y: t.clientY};
});

moveZone.addEventListener('touchmove', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === joyId) {
            let dx = t.clientX - joyAnchor.x, dy = t.clientY - joyAnchor.y;
            let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            let angle = Math.atan2(dy, dx);
            joyStick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
            moveDirection = {x: Math.cos(angle)*(dist/40), y: Math.sin(angle)*(dist/40)};
        }
    }
});

moveZone.addEventListener('touchend', () => { joyId = null; moveDirection = {x:0, y:0}; joyStick.style.transform = 'translate(-50%,-50%)'; });

window.addEventListener('touchstart', e => {
    if(e.target.closest('.action-btn')) return;
    const t = e.changedTouches[0];
    if(t.identifier !== joyId) { lookId = t.identifier; lastTouch = {x: t.clientX, y: t.clientY}; }
});

window.addEventListener('touchmove', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === lookId) {
            camera.rotation.y -= (t.clientX - lastTouch.x) * 0.004;
            camera.rotation.x -= (t.clientY - lastTouch.y) * 0.004;
            camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
            lastTouch = {x: t.clientX, y: t.clientY};
        }
    }
}, { passive: false });

        iBtn.innerText = "🎯 INTERACT";
        moveDirection = {x:0, y:0};

};

/**
 * MAIN RENDER LOOP
 */
function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const time = Date.now() * 0.001;
    
    mixers.forEach(m => m.update(dt));

    // Door Animation
    const targetDoorRot = isDoorOpen ? -Math.PI / 1.6 : 0;
    doorPivot.rotation.y += (targetDoorRot - doorPivot.rotation.y) * 0.12;

    // Party Surprise Trigger
    if(!surpriseTriggered && camera.position.z < 0 && isDoorOpen) {
        surpriseTriggered = true;
        launchParty();
    }

    // Confetti Physics
    confettis.forEach(c => {
        if(c.m.position.y > floorY + 5) {
            c.m.position.add(c.v);
            c.m.rotation.x += c.r;
            c.m.rotation.z += c.r;
        }
    });

    // Balloon Physics
    balloons.forEach(b => {
        if(b.b.position.y < ceilingY - 20) {
            b.b.position.y += b.s;
            b.b.position.x += Math.sin(time + b.offset) * 0.4;
        } else {
            b.b.position.y = (ceilingY - 20) + Math.sin(time * 0.5 + b.offset) * 5;
        }
    });

    // Movement & Collision
    if(!isInteracting && (moveDirection.x !== 0 || moveDirection.y !== 0)) {
        const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
        forward.y = 0; forward.normalize();
        const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
        right.y = 0; right.normalize();
        
        velocity.add(forward.multiplyScalar(-moveDirection.y * 1.2));
        velocity.add(right.multiplyScalar(moveDirection.x * 1.2));
    }
    
    velocity.multiplyScalar(0.85);
    camera.position.add(velocity);

    // Collision Boundaries
    camera.position.x = Math.max(-560, Math.min(560, camera.position.x));
    camera.position.z = Math.max(-560, Math.min(560, camera.position.z));
    
    // Wall Boundary Logic
    if(Math.abs(camera.position.z) < 25) {
        if(!isDoorOpen || Math.abs(camera.position.x) > 40) {
            camera.position.z = camera.position.z > 0 ? 25 : -25;
        }
    }

    // UI Updates
    dBtn.style.display = Math.abs(camera.position.z) < 200 ? 'block' : 'none';
    pBtn.style.display = (camera.position.z < 0 && camera.position.distanceTo(cssObj.position) < 500) ? 'block' : 'none';
    iBtn.style.display = (isPowered && camera.position.z < 0 && camera.position.distanceTo(cssObj.position) < 300) ? 'block' : 'none';
    document.getElementById('room-display').innerText = camera.position.z > 0 ? "GALLERY ENTRANCE" : "VIRTUAL SUITE";

    cssRenderer.render(cssScene, camera);
    renderer.render(scene, camera);
}

camera.position.set(0, 50, 450);
startApp();

</script>
</body>
