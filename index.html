        #ui-layer, .action-btn { z-index: 1000; position: absolute; }

        #room-display { font-size: 10px; color: #fff; background: rgba(255,105,180,0.7); padding: 4px 12px; border-radius: 15px; letter-spacing: 1px; }
        .action-btn { left: 50%; transform: translateX(-50%); padding: 12px 24px; font-size: 13px; font-weight: bold; color: #fff; border-radius: 30px; display: none; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

    let joyId = null, lookId = null, lastL = {x:0, y:0};
    const zMove = document.getElementById('zone-move'), joyS = document.getElementById('joy-stick'), joyC = document.getElementById('joy-container');
    
    zMove.addEventListener('touchstart', e => { joyId = e.changedTouches[0].identifier; lastL = {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY}; });
    zMove.addEventListener('touchmove', e => { 
        for(let t of e.changedTouches) if(t.identifier === joyId) { 
            let dx = t.clientX-lastL.x, dy = t.clientY-lastL.y; 
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 35), a = Math.atan2(dy, dx); 
            joyS.style.transform = `translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d}px))`; 
            move = {x: Math.cos(a)*d/35, y: Math.sin(a)*d/35}; 
        } 
    });
    zMove.addEventListener('touchend', () => { joyId=null; move={x:0,y:0}; joyS.style.transform = 'translate(-50%, -50%)'; });

    const iBtn = document.getElementById('interact-btn'), pBtn = document.getElementById('power-btn');
    document.getElementById('door-btn').onclick = () => isDoorOpen = !isDoorOpen;
    pBtn.onclick = async () => {
        isPowered = !isPowered; 
        if (isPowered) {
            try { await navigator.mediaDevices.getUserMedia({ audio: true }); } catch (err) {}
            document.getElementById('totify-iframe').src = "https://impraveen07.github.io/Win7/"; 
            frameEl.style.display = 'block'; 
        } else {
            document.getElementById('totify-iframe').src = ""; 
            frameEl.style.display = 'none'; 
        }
        pBtn.innerText = isPowered ? "🔌 POWER OFF" : "🔌 POWER ON"; 
    };
    
    iBtn.onclick = () => { 
        isInteracting = !isInteracting; 
        if(isInteracting) { 
            cssRenderer.domElement.style.zIndex='999'; cssRenderer.domElement.style.pointerEvents='auto'; 
            iBtn.innerText="🔒 EXIT INTERACT"; 
        } else { 
            cssRenderer.domElement.style.zIndex='1'; cssRenderer.domElement.style.pointerEvents='none'; 
            iBtn.innerText="🎯 INTERACT"; 
        } 
    };

    camera.position.set(0, 50, 400);
    const fVec = new THREE.Vector3(), rVec = new THREE.Vector3();
    let surpriseTriggered = false;
    const poppers = [], balloons = [], popColors = [0xff69b4, 0xffb3d9, 0xff1493, 0xffff00];

    function triggerParty() {
        bgm.play().catch(() => {});
        for(let i=0; i<400; i++) {
            const m = new THREE.Mesh(new THREE.PlaneGeometry(5,5), new THREE.MeshBasicMaterial({color: popColors[Math.floor(Math.random()*popColors.length)], side:2}));
            m.position.set((Math.random()-0.5)*800, 300, -300); 
            scene.add(m);
            poppers.push({ mesh: m, vel: new THREE.Vector3((Math.random()-0.5)*2, -Math.random()*2, (Math.random()-0.5)*2) });
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        mixers.forEach(m => m.update(delta));
        
        if(!isInteracting && (move.x !== 0 || move.y !== 0)) { 
            lastMoveTime = Date.now();
            fVec.set(0,0,-1).applyQuaternion(camera.quaternion); fVec.y=0; fVec.normalize(); 
            rVec.set(1,0,0).applyQuaternion(camera.quaternion); rVec.y=0; rVec.normalize(); 
            velocity.add(fVec.multiplyScalar(-move.y * 1.2)).add(rVec.multiplyScalar(move.x * 1.2)); 
            set(playerRef, { x: camera.position.x, y: camera.position.y, z: camera.position.z });
        }

        if (Date.now() - lastMoveTime > AFK_TIMEOUT) { set(playerRef, null); window.location.reload(); return; }

        if(!surpriseTriggered && camera.position.z < 0 && isDoorOpen) { surpriseTriggered = true; triggerParty(); }
        
        poppers.forEach(p => { if(p.mesh.position.y > floorY) p.mesh.position.add(p.vel); });
        
        velocity.multiplyScalar(0.9); camera.position.add(velocity);
        camera.position.x = Math.max(-550, Math.min(550, camera.position.x));
        camera.position.z = Math.max(-550, Math.min(550, camera.position.z));
        
        doorMesh.position.x += ((isDoorOpen ? -110 : 0) - doorMesh.position.x) * 0.1;
        
        cssRenderer.render(cssScene, camera); renderer.render(scene, camera); 
        document.getElementById('room-display').innerText = camera.position.z > 0 ? "SPAWN ROOM" : "TV ROOM";
    }

    boot();
</script>

</body>
</html>
